name: CICD

on:
    push:
        branches: ["master", "main"]
    pull_request:
        branches: ["master", "main"]

jobs:
    build:
        name: Building image
        runs-on: ubuntu-latest

        environment: CICDDEMO

        steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Set up Docker Buidlx
          uses: docker/setup-buildx-action@v3

        - name: Dockerhub login
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}

        - name: Build and push
          uses: docker/build-push-action@v6
          with:
            context: . 
            push: true
            tags: usmankhan68/procurment-project:latest

        - name: Send Email Notification
          uses: dawidd6/action-send-mail@v3
          if: always() 
          with:
            server_address: smtp.gmail.com
            server_port: 465
            username: ${{ secrets.GMAIL_USERNAME }}
            password: ${{ secrets.GMAIL_PASSWORD }}
            subject: GitHub Actions Build Notification
            to: fk514955@gmail.com
            from: GitHub Actions CI/CD
            body: The Docker build and push job for ProcurmentProject has finished with status ${{ job.status }}.